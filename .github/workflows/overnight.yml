name: Resumen de overnight

# El primer correo del día, uno por socio, con gráficas del overnight.
# 12:20 UTC = 6:20 hora de Morelia — antes que el recordatorio de la ventana (6:50),
# con holgura para el retraso que GitHub le mete a los cron cuando hay carga.
#
# Si el equipo cambia de huso: este cron y 'utc_offset' en data/avisos.json.

on:
  schedule:
    - cron: '20 12 * * 1-5'
  workflow_dispatch:
    inputs:
      prueba:
        description: 'Sólo generar (no manda correo; las gráficas quedan como artefacto)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: avisos                 # comparte grupo con los otros dos: no se pisan al commitear
  cancel-in-progress: false

jobs:
  resumir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar matplotlib
        run: pip install --quiet matplotlib

      - name: Armar y mandar el resumen
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 scripts/overnight.py ${{ inputs.prueba == true && '--prueba' || '' }}

      - name: Guardar las gráficas para poder verlas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overnight
          path: /tmp/northpoint-overnight
          if-no-files-found: ignore
          retention-days: 7

      - name: Anotar que ya salió hoy
        if: inputs.prueba != true
        run: |
          if git diff --quiet -- data/avisos-reloj.json data/bitacora.json; then
            echo "sin cambios"
            exit 0
          fi
          git config user.name  "northpoint-bot"
          git config user.email "actions@github.com"
          git add data/avisos-reloj.json data/bitacora.json
          git commit -m "overnight $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash -q && git push -q; then
              echo "publicado"
              exit 0
            fi
            echo "el push chocó con otro trabajo; reintento $i"
            sleep $((i * 4))
          done
          echo "no se pudo publicar después de 5 intentos" >&2
          exit 1
