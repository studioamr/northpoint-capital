name: Avisos a los socios

# El terminal es un sitio estático: el navegador no puede mandar correo. Este trabajo
# lee la mesa en Supabase, detecta qué cambió desde la última revisión y le avisa a los
# tres socios. Las credenciales viven en los secretos de GitHub, nunca en el repositorio.

on:
  schedule:
    - cron: '*/5 * * * *'      # cada 5 minutos
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: avisos
  cancel-in-progress: false     # que no se pise a sí mismo y duplique correos

jobs:
  vigilar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Revisar la mesa y avisar
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 scripts/avisos.py

      - name: Guardar lo ya avisado
        run: |
          if git diff --quiet -- data/avisos-visto.json data/bitacora.json; then
            echo "sin cambios"
            exit 0
          fi
          git config user.name  "northpoint-bot"
          git config user.email "actions@github.com"
          git add data/avisos-visto.json data/bitacora.json
          git commit -m "avisos revisados $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash -q && git push -q; then
              echo "publicado"
              exit 0
            fi
            echo "el push chocó con otro trabajo; reintento $i"
            sleep $((i * 4))
          done
          echo "no se pudo publicar después de 5 intentos" >&2
          exit 1
